site_name: BlankCut Docs
site_description: Documentation for the BlankCut platform and its internal tools.
site_url: https://docs.blankcut.com
copyright: © Blank Cut

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Overpass
    code: Overpass Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - BlankCut CLI:
      - Overview & setup: cli/index.md
      - Command reference: cli/commands.md
      - Secrets: cli/secrets.md
      - Supported stacks: cli/stacks.md
  - Kubernetes MCP Server:
      - Introduction: kubernetes-mcp-server/introduction.md
      - Quick start: kubernetes-mcp-server/quick-start.md
      - Installation: kubernetes-mcp-server/installation.md
      - Configuration: kubernetes-mcp-server/configuration.md
      - API overview: kubernetes-mcp-server/api-overview.md
      - Troubleshooting: kubernetes-mcp-server/troubleshooting-resources.md
      - Model Context Protocol: kubernetes-mcp-server/model-context-protocol.md
  # Each additional tool/product gets its own folder under docs/ and a block here.
